<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Lucera Global</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f1f3d;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #ffffff;
    --text-muted: #8a9bb5;
    --border: rgba(201,168,76,0.2);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
  }
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 3rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--navy);
    z-index: 100;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--white);
    text-decoration: none;
  }
  .logo span { color: var(--gold); }
  .nav-link {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-decoration: none;
    text-transform: uppercase;
  }
  .blog-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 4rem 2rem;
  }
  .blog-header {
    margin-bottom: 3rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2rem;
  }
  .blog-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .blog-eyebrow::before {
    content: '';
    width: 32px;
    height: 1px;
    background: var(--gold);
  }
  .blog-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    color: var(--white);
  }
  .post-list { display: flex; flex-direction: column; gap: 2rem; }
  .post-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    transition: border-color 0.2s;
    text-decoration: none;
    display: block;
  }
  .post-card:hover { border-color: var(--gold); }
  .post-date {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  .post-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }
  .post-desc {
    font-size: 0.9rem;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .post-arrow {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }
  .empty-state {
    text-align: center;
    padding: 4rem 0;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">LUCERA <span>GLOBAL</span></a>
  <a href="/" class="nav-link">← Back to Home</a>
</nav>
<div class="blog-container">
  <div class="blog-header">
    <div class="blog-eyebrow">Insights & Guides</div>
    <h1 class="blog-title">The Lucera Journal</h1>
  </div>
  <div class="post-list" id="postList">
    <div class="empty-state">
      <p>First articles coming soon.</p>
    </div>
  </div>
</div>
</body>
</html>
