<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal — Lucera Global</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f1f3d;
    --navy-mid: #1a3260;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #ffffff;
    --text-muted: #8a9bb5;
    --border: rgba(201,168,76,0.2);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
  }
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 3rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--navy);
    z-index: 100;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--white);
    text-decoration: none;
  }
  .logo span { color: var(--gold); }
  .nav-link {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-decoration: none;
    text-transform: uppercase;
  }
  .blog-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 4rem 2rem;
  }
  .blog-header {
    margin-bottom: 3rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2rem;
  }
  .blog-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .blog-eyebrow::before {
    content: '';
    width: 32px;
    height: 1px;
    background: var(--gold);
  }
  .blog-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    color: var(--white);
  }
  .post-list { display: flex; flex-direction: column; gap: 2rem; }
  .post-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    transition: border-color 0.2s;
    text-decoration: none;
    display: block;
    cursor: pointer;
  }
  .post-card:hover { border-color: var(--gold); }
  .post-date {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  .post-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }
  .post-desc {
    font-size: 0.9rem;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .post-arrow {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .empty-state {
    text-align: center;
    padding: 4rem 0;
    color: var(--text-muted);
  }

  /* Single post view */
  .post-content { display: none; }
  .post-content.active { display: block; }
  .post-list-wrap.hidden { display: none; }
  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.5rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2rem;
    display: inline-block;
  }
  .back-btn:hover { border-color: var(--gold); color: var(--gold); }
  .article-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 1rem;
  }
  .article-date {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
  .article-body {
    font-size: 1rem;
    line-height: 1.8;
    color: rgba(255,255,255,0.85);
  }
  .article-body h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: var(--white);
    margin: 2.5rem 0 1rem;
  }
  .article-body h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--gold-light);
    margin: 2rem 0 0.75rem;
  }
  .article-body p { margin-bottom: 1.25rem; }
  .article-body strong { color: var(--white); }
  .article-body a { color: var(--gold); text-decoration: none; }
  .article-body a:hover { text-decoration: underline; }
  .article-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }
  .article-body ul, .article-body ol {
    padding-left: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .article-body li { margin-bottom: 0.5rem; }
  .cta-box {
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 2rem;
    margin-top: 3rem;
    text-align: center;
  }
  .cta-box p { color: var(--text-muted); margin-bottom: 1rem; }
  .cta-btn {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    padding: 0.75rem 2rem;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">LUCERA <span>GLOBAL</span></a>
  <a href="/" class="nav-link">← Home</a>
</nav>

<div class="blog-container">
  <!-- Blog list -->
  <div class="post-list-wrap" id="listWrap">
    <div class="blog-header">
      <div class="blog-eyebrow">Insights & Guides</div>
      <h1 class="blog-title">The Lucera Journal</h1>
    </div>
    <div class="post-list" id="postList">
      <div class="loading">Loading articles...</div>
    </div>
  </div>

  <!-- Single post view -->
  <div class="post-content" id="postContent">
    <button class="back-btn" onclick="showList()">← All Articles</button>
    <h1 class="article-title" id="articleTitle"></h1>
    <div class="article-date" id="articleDate"></div>
    <div class="article-body" id="articleBody"></div>
    <div class="cta-box">
      <p>Ready to find out if you're a candidate?</p>
      <a href="/" class="cta-btn">Request a Consultation →</a>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
const GITHUB_USER = 'yusuf15emre-hue';
const GITHUB_REPO = 'lucera-global';
const BLOG_PATH = 'blog';

async function fetchPosts() {
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${BLOG_PATH}`);
    const files = await res.json();
    const mdFiles = files.filter(f => f.name.endsWith('.md') && f.name !== 'README.md');
    
    if (mdFiles.length === 0) {
      document.getElementById('postList').innerHTML = '<div class="empty-state"><p>First articles coming soon.</p></div>';
      return;
    }

    const posts = await Promise.all(mdFiles.map(async file => {
      const r = await fetch(file.download_url);
      const text = await r.text();
      return parsePost(text, file.name);
    }));

    posts.sort((a, b) => new Date(b.date) - new Date(a.date));
    renderList(posts);
  } catch(e) {
    document.getElementById('postList').innerHTML = '<div class="empty-state"><p>Articles coming soon.</p></div>';
  }
}

function parsePost(text, filename) {
  const lines = text.split('\n');
  let title = '';
  let date = '';
  let description = '';
  let bodyStart = 0;

  // Try to get frontmatter
  if (lines[0] === '---') {
    let i = 1;
    while (i < lines.length && lines[i] !== '---') {
      if (lines[i].startsWith('title:')) title = lines[i].replace('title:', '').trim().replace(/['"]/g, '');
      if (lines[i].startsWith('date:')) date = lines[i].replace('date:', '').trim();
      if (lines[i].startsWith('description:')) description = lines[i].replace('description:', '').trim().replace(/['"]/g, '');
      i++;
    }
    bodyStart = i + 1;
  }

  // Fallback: get title from first H1
  if (!title) {
    const h1 = lines.find(l => l.startsWith('# '));
    if (h1) title = h1.replace('# ', '').trim();
  }

  // Remove meta description line from body
  const bodyLines = lines.slice(bodyStart).filter(l => !l.startsWith('**Meta Description:**'));
  const body = bodyLines.join('\n');

  // Get first paragraph as description if not set
  if (!description) {
    const firstPara = bodyLines.find(l => l.trim().length > 50 && !l.startsWith('#') && !l.startsWith('*'));
    description = firstPara ? firstPara.substring(0, 150) + '...' : '';
  }

  return { title, date, description, body, filename };
}

function renderList(posts) {
  const list = document.getElementById('postList');
  list.innerHTML = posts.map((post, i) => `
    <div class="post-card" onclick="showPost(${i})">
      <div class="post-date">${formatDate(post.date)}</div>
      <div class="post-title">${post.title}</div>
      <div class="post-desc">${post.description}</div>
      <div class="post-arrow">Read article →</div>
    </div>
  `).join('');
  window._posts = posts;
}

function showPost(i) {
  const post = window._posts[i];
  document.getElementById('articleTitle').textContent = post.title;
  document.getElementById('articleDate').textContent = formatDate(post.date);
  document.getElementById('articleBody').innerHTML = marked.parse(post.body);
  document.getElementById('listWrap').classList.add('hidden');
  document.getElementById('postContent').classList.add('active');
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('listWrap').classList.remove('hidden');
  document.getElementById('postContent').classList.remove('active');
  window.scrollTo(0, 0);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    return new Date(dateStr).toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
  } catch(e) { return dateStr; }
}

fetchPosts();
</script>
</body>
</html>
